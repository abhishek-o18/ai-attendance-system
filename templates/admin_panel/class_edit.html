{% extends 'base.html' %}

{% block title %}Edit Class{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card">
            <div class="card-header bg-info text-white">
                <h4 class="mb-0"><i class="bi bi-pencil"></i> Edit Class</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Class Code</label>
                            <input type="text" class="form-control" value="{{ class_obj.class_code }}" disabled>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Class Name *</label>
                            <input type="text" class="form-control" name="class_name" value="{{ class_obj.class_name }}" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Subject *</label>
                            <select class="form-select" name="subject" required>
                                {% for subject in subjects %}
                                    <option value="{{ subject.id }}" {% if subject.id == class_obj.subject.id %}selected{% endif %}>
                                        {{ subject.subject_name }} ({{ subject.subject_code }})
                                    </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Room</label>
                            <input type="text" class="form-control" name="room" value="{{ class_obj.room }}">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Schedule</label>
                        <input type="text" class="form-control" name="schedule" value="{{ class_obj.schedule }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Assign Teachers</label>
                        <select class="form-select" name="teachers" multiple size="5">
                            {% for teacher in teachers %}
                                <option value="{{ teacher.id }}" {% if teacher in class_obj.teachers.all %}selected{% endif %}>
                                    {{ teacher.user.get_full_name|default:teacher.user.username }} ({{ teacher.teacher_id }})
                                </option>
                            {% endfor %}
                        </select>
                        <small class="form-text text-muted">Hold Ctrl (Windows) or Cmd (Mac) to select multiple teachers.</small>
                    </div>
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{% url 'admin_panel:class_list' %}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-info">Update Class</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
